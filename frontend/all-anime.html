<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AnimeStream - Semua Anime</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-left">
                <span class="greeting">📚 Semua Anime</span>
            </div>
            <div class="header-right">
                <div class="sort-buttons">
                    <button class="sort-btn active" data-sort="az">A-Z</button>
                    <button class="sort-btn" data-sort="latest">Latest</button>
                </div>
            </div>
        </div>

        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Cari anime..." class="search-input">
        </div>

        <div class="anime-grid" id="animeGrid">
            <div class="loading">Memuat...</div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" data-page="home">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">Home</div>
            </div>
            <div class="nav-item" data-page="jadwal">
                <div class="nav-icon">📅</div>
                <div class="nav-label">Jadwal</div>
            </div>
            <div class="nav-item" data-page="history">
                <div class="nav-icon">📜</div>
                <div class="nav-label">History</div>
            </div>
            <div class="nav-item" data-page="kontak">
                <div class="nav-icon">📞</div>
                <div class="nav-label">Kontak</div>
            </div>
            <div class="nav-item active" data-page="profile">
                <div class="nav-icon">👤</div>
                <div class="nav-label">Profil</div>
            </div>
        </div>
    </div>

    <script src="/js/all-anime.js"></script>
    <script src="/js/level.js"></script>
    <script src="/js/maintenance.js"></script>
    <script>
        document.querySelectorAll('.nav-item').forEach(async (item) => {
            item.addEventListener('click', async () => {
                const page = item.dataset.page;
                
                if (page === 'kontak') {
                    window.location.href = '/kontak.html';
                    return;
                }
                
                let url = '';
                if (page === 'home') url = '/index.html';
                if (page === 'jadwal') url = '/jadwal.html';
                if (page === 'history') url = '/history.html';
                if (page === 'profile') url = '/profile.html';
                
                if (url) {
                    const allowed = await window.checkMaintenanceAccess();
                    if (allowed) window.location.href = url;
                }
            });
        });
    </script>
</body>
</html>
