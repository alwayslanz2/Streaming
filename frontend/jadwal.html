<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AnimeStream - Jadwal Tayang</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-left">
                <span class="greeting">📅 Jadwal Tayang</span>
            </div>
            <div class="header-right">
                <span class="level-badge" id="levelBadge">⭐ Lv.1 | 0/100 XP | 0 jam</span>
            </div>
        </div>

        <div class="week-nav" id="weekNav">
            <div class="week-day active" data-day="Min">Min<br><span class="date">26</span></div>
            <div class="week-day" data-day="Sen">Sen<br><span class="date">27</span></div>
            <div class="week-day" data-day="Sel">Sel<br><span class="date">28</span></div>
            <div class="week-day" data-day="Rab">Rab<br><span class="date">29</span></div>
            <div class="week-day" data-day="Kam">Kam<br><span class="date">30</span></div>
            <div class="week-day" data-day="Jum">Jum<br><span class="date">31</span></div>
            <div class="week-day" data-day="Sab">Sab<br><span class="date">1</span></div>
        </div>

        <div class="schedule-list" id="scheduleList">
            <div class="loading">Memuat jadwal...</div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" data-page="home">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">Home</div>
            </div>
            <div class="nav-item active" data-page="jadwal">
                <div class="nav-icon">📅</div>
                <div class="nav-label">Jadwal</div>
            </div>
            <div class="nav-item" data-page="history">
                <div class="nav-icon">📜</div>
                <div class="nav-label">History</div>
            </div>
            <div class="nav-item" data-page="profile">
                <div class="nav-icon">👤</div>
                <div class="nav-label">Profil</div>
            </div>
        </div>
    </div>

    <script src="/js/jadwal.js"></script>
    <script src="/js/level.js"></script>
</body>
</html>
