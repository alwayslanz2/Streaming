<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chat Global - AnimeStream</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-left">
                <span class="back-btn" onclick="history.back()">← Kembali</span>
            </div>
            <div class="header-right">
                <span class="level-badge" id="levelBadge">⭐ Lv.1 | 0/100 XP | 0 jam</span>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <h2>💬 Chat Global</h2>
                <p>Diskusi dengan sesama penonton anime</p>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="loading">Memuat chat...</div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Ketik pesan..." maxlength="500">
                <button id="sendBtn">📤 Kirim</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" data-page="home"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></div>
            <div class="nav-item" data-page="jadwal"><div class="nav-icon">📅</div><div class="nav-label">Jadwal</div></div>
            <div class="nav-item" data-page="history"><div class="nav-icon">📜</div><div class="nav-label">History</div></div>
            <div class="nav-item" data-page="kontak"><div class="nav-icon">📞</div><div class="nav-label">Kontak</div></div>
            <div class="nav-item active" data-page="chat"><div class="nav-icon">💬</div><div class="nav-label">Chat</div></div>
            <div class="nav-item" data-page="profile"><div class="nav-icon">👤</div><div class="nav-label">Profil</div></div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentUserId = null;
        let isAdmin = false;
        let refreshInterval = null;

        const userStr = localStorage.getItem('user');
        const token = localStorage.getItem('token');

        if (userStr) {
            try {
                currentUser = JSON.parse(userStr);
                currentUserId = currentUser.id;
                isAdmin = currentUser.level >= 99999;
            } catch(e) {}
        }

        if (!token) {
            alert('Silakan login terlebih dahulu untuk menggunakan chat');
            window.location.href = '/login.html';
        }

        async function loadMessages() {
            try {
                const res = await axios.get('/api/chat/messages', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                renderMessages(res.data);
            } catch (err) {
                console.error('Gagal load chat:', err);
            }
        }

        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="chat-empty">Belum ada pesan. Jadilah yang pertama! 💬</div>';
                return;
            }
            
            container.innerHTML = '';
            messages.forEach(msg => {
                const isCurrentUser = (msg.userId === currentUserId);
                const isAdminUser = msg.username === 'AdminSuper';
                const time = new Date(msg.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                
                const messageDiv = document.createElement('div');
                messageDiv.className = `chat-message ${isCurrentUser ? 'my-message' : 'other-message'}`;
                messageDiv.id = `msg-${msg._id}`;
                messageDiv.innerHTML = `
                    <div class="chat-message-header">
                        <span class="chat-username" style="color: ${isAdminUser ? '#f9ca24' : '#e94560'}">${escapeHtml(msg.username)}</span>
                        <span class="chat-time">${time}</span>
                        ${isAdmin ? `<button class="chat-delete-btn" onclick="deleteMessage('${msg._id}')">🗑️</button>` : ''}
                    </div>
                    <div class="chat-message-text">${escapeHtml(msg.message)}</div>
                `;
                container.appendChild(messageDiv);
            });
            scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            
            try {
                await axios.post('/api/chat/messages', { message }, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                input.value = '';
                loadMessages();
            } catch (err) {
                alert(err.response?.data?.error || 'Gagal kirim pesan');
            }
        }

        window.deleteMessage = async (messageId) => {
            if (!isAdmin) return;
            try {
                await axios.delete(`/api/chat/messages/${messageId}`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                loadMessages();
            } catch (err) {
                alert(err.response?.data?.error || 'Gagal hapus pesan');
            }
        };

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Refresh chat setiap 3 detik
        loadMessages();
        refreshInterval = setInterval(loadMessages, 3000);

        // Bottom navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                const url = {
                    home: '/index.html', jadwal: '/jadwal.html', history: '/history.html',
                    kontak: '/kontak.html', chat: '/chat.html', profile: '/profile.html'
                }[page];
                if (url) window.location.href = url;
            });
        });

        // Cleanup interval saat leave
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
        });
    </script>
</body>
</html>
