<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chat Global - AnimeStream</title>
<style>
/* ========== CHAT PAGE ========== */
.chat-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 120px);
    padding: 12px 16px;
}

.chat-header {
    text-align: center;
    margin-bottom: 16px;
}

.chat-header h2 {
    font-size: 20px;
    font-weight: 700;
    color: #e94560;
}

.chat-header p {
    font-size: 12px;
    color: #888;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    background: #0f0f0f;
    border-radius: 16px;
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.chat-message {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 18px;
    background: #1a1a1a;
    word-wrap: break-word;
}

.chat-message.my-message {
    align-self: flex-end;
    background: linear-gradient(135deg, #e94560, #ff6b6b);
    color: white;
}

.chat-message.other-message {
    align-self: flex-start;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
}

.chat-message-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 11px;
}

.chat-username {
    font-weight: 600;
}

.chat-time {
    color: #888;
    font-size: 10px;
}

.chat-message-text {
    font-size: 13px;
    line-height: 1.4;
}

.chat-delete-btn {
    background: transparent;
    border: none;
    color: #e94560;
    cursor: pointer;
    font-size: 12px;
    margin-left: 8px;
}

.chat-delete-btn:hover {
    opacity: 0.8;
}

.chat-input-area {
    display: flex;
    gap: 10px;
    padding: 12px;
    background: #0f0f0f;
    border-radius: 30px;
    border: 1px solid #1a1a1a;
}

.chat-input-area input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    font-size: 14px;
    padding: 8px 0;
    outline: none;
}

.chat-input-area button {
    background: linear-gradient(135deg, #e94560, #ff6b6b);
    border: none;
    padding: 8px 16px;
    border-radius: 30px;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

.chat-empty {
    text-align: center;
    color: #888;
    padding: 40px;
}
</style>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-left">
                <span class="back-btn" onclick="history.back()">← Kembali</span>
            </div>
            <div class="header-right">
                <span class="level-badge" id="levelBadge">⭐ Lv.1 | 0/100 XP | 0 jam</span>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <h2>💬 Chat Global</h2>
                <p>Diskusi dengan sesama penonton anime</p>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="loading">Memuat chat...</div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Ketik pesan..." maxlength="500">
                <button id="sendBtn">📤 Kirim</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item" data-page="home">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">Home</div>
            </div>
            <div class="nav-item" data-page="jadwal">
                <div class="nav-icon">📅</div>
                <div class="nav-label">Jadwal</div>
            </div>
            <div class="nav-item" data-page="history">
                <div class="nav-icon">📜</div>
                <div class="nav-label">History</div>
            </div>
            <div class="nav-item" data-page="kontak">
                <div class="nav-icon">📞</div>
                <div class="nav-label">Kontak</div>
            </div>
            <div class="nav-item active" data-page="chat">
                <div class="nav-icon">💬</div>
                <div class="nav-label">Chat</div>
            </div>
            <div class="nav-item" data-page="profile">
                <div class="nav-icon">👤</div>
                <div class="nav-label">Profil</div>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let currentUser = null;
        let currentUserId = null;
        let isAdmin = false;

        // Ambil user dari localStorage
        const userStr = localStorage.getItem('user');
        const token = localStorage.getItem('token');
        
        if (userStr) {
            try {
                currentUser = JSON.parse(userStr);
                currentUserId = currentUser.id;
                // Cek apakah admin (level >= 99999)
                isAdmin = currentUser.level >= 99999;
            } catch(e) {}
        }

        if (!token) {
            alert('Silakan login terlebih dahulu untuk menggunakan chat');
            window.location.href = '/login.html';
        }

        // Koneksi Socket.IO
        socket = io();

        socket.on('connect', () => {
            console.log('✅ Terhubung ke chat server');
        });

        // Terima history chat
        socket.on('chat-history', (messages) => {
            renderMessages(messages);
        });

        // Terima pesan baru
        socket.on('new-message', (message) => {
            appendMessage(message);
        });

        // Terima notifikasi hapus pesan
        socket.on('message-deleted', (messageId) => {
            const msgElement = document.getElementById(`msg-${messageId}`);
            if (msgElement) {
                msgElement.remove();
            }
        });

        // Render semua pesan
        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');
            if (messages.length === 0) {
                container.innerHTML = '<div class="chat-empty">Belum ada pesan. Jadilah yang pertama! 💬</div>';
                return;
            }
            
            container.innerHTML = '';
            messages.forEach(msg => {
                appendMessage(msg, false);
            });
            scrollToBottom();
        }

        // Append 1 pesan ke DOM
        function appendMessage(msg, scroll = true) {
            const container = document.getElementById('chatMessages');
            const isCurrentUser = (msg.userId === currentUserId);
            const isAdminUser = msg.username === 'AdminSuper' || (msg.userId === 'admin');
            
            // Hapus placeholder jika ada
            if (container.innerHTML.includes('Belum ada pesan')) {
                container.innerHTML = '';
            }
            
            const time = new Date(msg.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${isCurrentUser ? 'my-message' : 'other-message'}`;
            messageDiv.id = `msg-${msg._id}`;
            
            messageDiv.innerHTML = `
                <div class="chat-message-header">
                    <span class="chat-username" style="color: ${isAdminUser ? '#f9ca24' : '#e94560'}">${escapeHtml(msg.username)}</span>
                    <span class="chat-time">${time}</span>
                    ${isAdmin ? `<button class="chat-delete-btn" onclick="deleteMessage('${msg._id}')">🗑️</button>` : ''}
                </div>
                <div class="chat-message-text">${escapeHtml(msg.message)}</div>
            `;
            
            container.appendChild(messageDiv);
            if (scroll) scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Kirim pesan
        document.getElementById('sendBtn').addEventListener('click', () => {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            if (!currentUserId) {
                alert('Silakan login terlebih dahulu');
                return;
            }
            
            socket.emit('send-message', {
                userId: currentUserId,
                username: currentUser?.username || 'Anonymous',
                message: message
            });
            
            input.value = '';
        });

        // Enter untuk kirim
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('sendBtn').click();
            }
        });

        // Hapus pesan (hanya admin)
        window.deleteMessage = (messageId) => {
            if (!isAdmin) return;
            socket.emit('delete-message', { messageId, isAdmin: true });
        };

        // Bottom navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                let url = '';
                if (page === 'home') url = '/index.html';
                if (page === 'jadwal') url = '/jadwal.html';
                if (page === 'history') url = '/history.html';
                if (page === 'kontak') url = '/kontak.html';
                if (page === 'chat') url = '/chat.html';
                if (page === 'profile') url = '/profile.html';
                if (url) window.location.href = url;
            });
        });
    </script>
    <script src="/js/level.js"></script>
</body>
</html>
